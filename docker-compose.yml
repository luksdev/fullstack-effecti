services:
  app:
    build: .
    command: >
      sh -c "[ -f .env ] || cp .env.example .env;
      composer install --no-interaction --prefer-dist;
      grep -qE '^APP_KEY=.+' .env || php artisan key:generate;
      php artisan migrate --force --seed;
      php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      pgsql:
        condition: service_healthy
  vite:
    build: .
    working_dir: /app
    command: >
      sh -c "until [ -f vendor/autoload.php ] && grep -qE '^APP_KEY=.+' .env 2>/dev/null; do
      echo 'waiting for app to finish bootstrapping...'; sleep 2; done;
      npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    depends_on:
      - app
  pgsql:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: teste_effecti
      POSTGRES_USER: effecti
      POSTGRES_PASSWORD: secret
    volumes:
      - pgsql-data:/var/lib/postgresql
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/10-create-testing-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U effecti -d teste_effecti"]
      interval: 5s
      retries: 5
volumes:
  pgsql-data: